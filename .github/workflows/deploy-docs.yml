name: deploy docs-site to Vercel

# Deploys apps/docs-site. PRs get preview deployments; pushes to main are
# promoted to production. Requires three repo secrets:
#   VERCEL_TOKEN        — personal token from vercel.com/account/tokens
#   VERCEL_ORG_ID       — `id` from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID   — `projectId` from .vercel/project.json
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A new push to a branch supersedes any in-flight deploy for that branch.
concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: ${{ github.event_name == 'push' && 'production' || 'preview' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      IS_PRODUCTION: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Pulls the project's Vercel config (env vars, framework preset, etc.)
      # into a local .vercel/ directory. `--yes` skips the interactive prompt.
      - name: Pull Vercel environment
        working-directory: apps/docs-site
        run: vercel pull --yes --environment=${{ env.IS_PRODUCTION == 'true' && 'production' || 'preview' }} --token=$VERCEL_TOKEN

      # The Expo web export step lives in `build:all` (see docs-site
      # package.json). Running it here, outside Vercel's build, lets us iterate
      # on the workflow without re-running the full build in Vercel.
      - name: Build (Expo export + Astro)
        working-directory: apps/docs-site
        run: vercel build ${{ env.IS_PRODUCTION == 'true' && '--prod' || '' }} --token=$VERCEL_TOKEN

      - name: Deploy
        id: deploy
        working-directory: apps/docs-site
        run: |
          URL=$(vercel deploy --prebuilt ${{ env.IS_PRODUCTION == 'true' && '--prod' || '' }} --token=$VERCEL_TOKEN)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to $URL"

      # On PRs, surface the preview URL as a sticky comment so reviewers can
      # click straight through to the deployed site.
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: vercel-docs-preview
          message: |
            📘 docs-site preview: ${{ steps.deploy.outputs.url }}
